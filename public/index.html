<html>
<head>
    <meta charset="utf-8">
    <title>iptv</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        .player-entry {
            max-width: 800px;
            margin: 20px auto 0;
            padding: 16px 20px;
            background: linear-gradient(135deg, #1a73e8, #4a9eff);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(26,115,232,0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #fff;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .player-entry:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(26,115,232,0.4);
            text-decoration: none;
        }
        .player-entry .entry-text {
            font-size: 16px;
            font-weight: 600;
        }
        .player-entry .entry-desc {
            font-size: 13px;
            opacity: 0.85;
            margin-top: 2px;
        }
        .player-entry .entry-arrow {
            font-size: 24px;
            opacity: 0.8;
        }
        #content {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        h1, h2, h3, h4, h5, h6 {
            margin-top: 0;
        }
        a {
            color: #0366d6;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        pre {
            background-color: #f8f8f8;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        code {
            background-color: #f8f8f8;
            padding: 2px 5px;
            border-radius: 3px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f0f0f0;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        td {
            word-break: break-all;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <a class="player-entry" href="/iptv">
        <div>
            <div class="entry-text">📺 在线播放 IPTV 直播</div>
            <div class="entry-desc">浏览器直接观看，支持频道切换、EPG 节目预告、搜索</div>
        </div>
        <span class="entry-arrow">→</span>
    </a>
    <div id="content"></div>
    <script src="/index.js"></script>
</body>
</html>
