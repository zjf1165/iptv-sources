<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --bg-hover: #2a2a2a;
            --bg-active: #1e3a5f;
            --text-primary: #e0e0e0;
            --text-secondary: #999;
            --text-muted: #666;
            --accent: #4a9eff;
            --accent-dim: #2d6cb5;
            --border: #2a2a2a;
            --success: #4caf50;
            --error: #ef5350;
            --sidebar-width: 320px;
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header h1::before {
            content: '📺';
            font-size: 20px;
        }

        /* Source selector */
        .source-selector {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .source-selector select {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        .source-selector select:focus {
            border-color: var(--accent);
        }

        /* Search */
        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
        }

        .search-box input::placeholder { color: var(--text-muted); }
        .search-box input:focus { border-color: var(--accent); }

        /* Channel list */
        .channel-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--bg-tertiary) transparent;
        }

        .channel-list::-webkit-scrollbar { width: 6px; }
        .channel-list::-webkit-scrollbar-track { background: transparent; }
        .channel-list::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }

        .group-header {
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--bg-secondary);
            position: sticky;
            top: 0;
            z-index: 1;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .group-header:hover { background: var(--bg-tertiary); }

        .group-header .count {
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .group-header .arrow {
            transition: transform 0.2s;
            font-size: 10px;
            color: var(--text-muted);
        }

        .group-header.collapsed .arrow { transform: rotate(-90deg); }

        .group-channels { overflow: hidden; }
        .group-channels.hidden { display: none; }

        .channel-item {
            padding: 10px 16px 10px 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.15s;
            border-left: 3px solid transparent;
        }

        .channel-item:hover { background: var(--bg-hover); }

        .channel-item.active {
            background: var(--bg-active);
            border-left-color: var(--accent);
        }

        .channel-logo {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            background: var(--bg-tertiary);
            flex-shrink: 0;
            object-fit: contain;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--text-muted);
            overflow: hidden;
        }

        .channel-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .channel-info { flex: 1; min-width: 0; }

        .channel-name {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-epg-now {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        /* ── Main content ── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* Player area */
        .player-area {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 0;
        }

        #video-player {
            width: 100%;
            height: 100%;
            background: #000;
        }

        .player-placeholder {
            text-align: center;
            color: var(--text-muted);
        }

        .player-placeholder .icon { font-size: 64px; margin-bottom: 16px; }
        .player-placeholder p { font-size: 16px; }

        /* Player overlay for loading/error */
        .player-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .player-overlay.visible { opacity: 1; pointer-events: auto; }

        .player-overlay .message {
            text-align: center;
            color: var(--text-primary);
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--bg-tertiary);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Info bar */
        .info-bar {
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            min-height: 56px;
        }

        .now-playing {
            flex: 1;
            min-width: 0;
        }

        .now-playing .channel-title {
            font-size: 15px;
            font-weight: 600;
        }

        .now-playing .epg-info {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .now-playing .epg-info .label {
            color: var(--accent);
            margin-right: 4px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn:hover { background: var(--bg-hover); border-color: var(--accent-dim); }
        .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* ── EPG Panel (toggle) ── */
        .epg-panel {
            width: 300px;
            min-width: 300px;
            height: 100vh;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: margin-right 0.3s;
        }

        .epg-panel.hidden {
            display: none;
        }

        .epg-panel-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .epg-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--bg-tertiary) transparent;
        }

        .epg-list::-webkit-scrollbar { width: 6px; }
        .epg-list::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }

        .epg-item {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .epg-item.current {
            background: var(--bg-active);
            border-left: 3px solid var(--accent);
        }

        .epg-item .time {
            color: var(--accent);
            font-size: 12px;
            font-family: 'SF Mono', 'Menlo', monospace;
        }

        .epg-item .title {
            margin-top: 2px;
            color: var(--text-primary);
        }

        .epg-empty {
            padding: 40px 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* ── Toggle sidebar (mobile) ── */
        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 100;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            :root { --sidebar-width: 280px; }

            .sidebar {
                position: fixed;
                left: 0; top: 0;
                transform: translateX(-100%);
                transition: transform 0.3s;
                box-shadow: 4px 0 20px rgba(0,0,0,0.5);
            }

            .sidebar.open { transform: translateX(0); }

            .sidebar-toggle { display: flex; }

            .sidebar-backdrop {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 9;
            }

            .sidebar-backdrop.visible { display: block; }

            .epg-panel { display: none !important; }
        }

        @media (max-width: 600px) {
            .info-bar { padding: 8px 12px; gap: 8px; }
            .now-playing .channel-title { font-size: 13px; }
        }
    </style>
</head>
<body>

    <button class="sidebar-toggle" id="sidebarToggle">☰</button>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>IPTV Player</h1>
        </div>
        <div class="source-selector">
            <select id="sourceSelect">
                <option value="">加载中...</option>
            </select>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索频道...">
        </div>
        <div class="channel-list" id="channelList"></div>
    </aside>

    <main class="main-content">
        <div class="player-area" id="playerArea">
            <video id="video-player" controls autoplay></video>
            <div class="player-placeholder" id="playerPlaceholder">
                <div class="icon">📺</div>
                <p>选择一个频道开始播放</p>
            </div>
            <div class="player-overlay" id="playerOverlay">
                <div class="message">
                    <div class="spinner" id="overlaySpinner"></div>
                    <p id="overlayText">加载中...</p>
                </div>
            </div>
        </div>
        <div class="info-bar">
            <div class="now-playing">
                <div class="channel-title" id="nowChannelName">未选择频道</div>
                <div class="epg-info" id="nowEpgInfo"></div>
            </div>
            <div class="player-controls">
                <button class="btn" id="btnEpg" title="节目预告">📋 EPG</button>
                <button class="btn" id="btnPrev" title="上一个频道">⏮</button>
                <button class="btn" id="btnNext" title="下一个频道">⏭</button>
            </div>
        </div>
    </main>

    <aside class="epg-panel hidden" id="epgPanel">
        <div class="epg-panel-header" id="epgPanelTitle">节目预告</div>
        <div class="epg-list" id="epgList">
            <div class="epg-empty">选择频道查看节目预告</div>
        </div>
    </aside>

    <script src="/player.js"></script>
</body>
</html>
